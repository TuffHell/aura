# Fly.io deployment for AURA talk. Rename `app` to something unique, pick a
# region near you, then: fly launch --no-deploy && fly secrets set ANTHROPIC_API_KEY=... && fly deploy
app = "aura-talk"
primary_region = "iad"        # change to your nearest region (e.g. lhr, fra, sjc, syd)

[build]

[env]
  AURA_MODEL = "claude-haiku-4-5"   # cheapest/snappiest brain; ANTHROPIC_API_KEY is a secret
  PORT = "8600"

[http_service]
  internal_port = 8600
  force_https = true
  auto_stop_machines = "stop"       # scale to zero when idle -> you pay ~nothing at rest
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-2x"            # Whisper + Piper on CPU need headroom
  memory = "2gb"
